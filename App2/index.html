<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7C9E7E">
  <title>Finanzen</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Theme vor dem ersten Paint setzen (kein Aufblitzen der Standardpalette)
    (function () {
      try {
        var t = localStorage.getItem('theme') || 'sage';
        var m = localStorage.getItem('mode') || 'auto';
        var el = document.documentElement;
        el.setAttribute('data-theme', t);
        var dark = m === 'dark' ||
          (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        el.classList.toggle('dark', dark);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <nav class="bottom-nav">
    <button class="nav-item active" data-view="months">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8" fill="none"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.8"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Monat</span>
    </button>
    <button class="nav-item" data-view="summary">
      <svg viewBox="0 0 24 24"><polyline points="3,17 9,11 13,15 21,7" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14,7 21,7 21,14" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Auswertung</span>
    </button>
    <button class="nav-item" data-view="contracts">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.8" fill="none"/><polyline points="14,2 14,8 20,8" stroke="currentColor" stroke-width="1.8" fill="none"/><line x1="8" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="8" y1="17" x2="13" y2="17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Verträge</span>
    </button>
    <button class="nav-item" data-view="settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.8" fill="none"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.8" fill="none"/></svg>
      <span>Einstellungen</span>
    </button>
  </nav>

  <main class="main-content">
    <div id="view-months" class="view active"></div>
    <div id="view-summary" class="view"></div>
    <div id="view-contracts" class="view"></div>
    <div id="view-settings" class="view"></div>
  </main>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title"></h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/months.js"></script>
  <script src="js/fixtemplates.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/contracts.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
